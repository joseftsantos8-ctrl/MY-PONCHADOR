<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ponchador - Control de Asistencia</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--primary:#10b981;--warning:#f59e0b;--danger:#ef4444;--accent:#8b5cf6;--dark:#ffffff;--light:#f3f4f6;--success:#10b981;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#f0fdfa 0%,#e0f2fe 100%);color:#111827;min-height:100vh;padding:1rem;}
    .card,.admin-panel,.profile-screen{background:white;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.15);padding:1.8rem;width:100%;max-width:540px;margin:1rem auto;}
    h1,h2,h3{text-align:center;margin-bottom:1.4rem;color:var(--dark);}
    .form-group{margin-bottom:1.2rem;}
    label{display:block;margin-bottom:0.4rem;font-weight:600;}
    input,select,textarea{width:100%;padding:0.85rem;border:1px solid #d1d5db;border-radius:8px;font-size:1rem;}
    button{width:100%;padding:1rem;font-size:1.05rem;font-weight:600;border:none;border-radius:10px;cursor:pointer;margin-top:0.7rem;}
    #btnLogin,#btnSaveEdit{background:var(--primary);color:white;}
    #btnCreate{background:var(--success);color:white;}
    #btnBack,#btnBackToLogin,#btnCancelEdit{background:#6b7280;color:white;}
    .message{margin:1.1rem 0;padding:0.8rem;border-radius:8px;text-align:center;}
    .error{background:#fee2e2;color:#991b1b;}.success{background:#d1fae5;color:#065f46;}
    .hidden{display:none!important;}
    .user-item{background:#f8fafc;padding:1.1rem;margin-bottom:1rem;border-radius:10px;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;}
    .btn-delete{background:var(--danger);color:white;padding:0.7rem 1.3rem;font-size:0.95rem;border:none;border-radius:8px;cursor:pointer;}
    #userList{margin-top:1.4rem;}
    .profile-pic{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid var(--primary);margin:0 auto 1rem;display:block;}
    .profile-pic-placeholder{font-size:3.5rem;color:#d1d5db;}
    .edit-btn{background:var(--accent);color:white;font-size:0.95rem;padding:0.6rem 1.2rem;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .admin-tabs{display:flex;gap:0.6rem;margin-bottom:1.4rem;justify-content:center;}
    .admin-tab{padding:0.7rem 1.4rem;background:#e5e7eb;border-radius:8px;cursor:pointer;font-weight:500;}
    .admin-tab.active{background:var(--primary);color:white;}
  </style>
</head>
<body>

<!-- Pantalla de Login / Registro -->
<div id="auth-screen">
  <div class="card">
    <h1><i class="fas fa-clock"></i> Ponchador</h1>
    
    <div id="login-form">
      <div class="form-group"><label>Código de empleado</label><input type="text" id="inputCodigo" placeholder="Ej: ABCDE" autocomplete="off"></div>
      <div class="form-group"><label>Contraseña</label><input type="password" id="inputPass" placeholder="••••••••"></div>
      <button id="btnLogin">Iniciar sesión</button>
      <div id="login-message" class="message"></div>
      <p style="text-align:center;margin-top:1.1rem;">¿No tienes cuenta? <a href="#" id="linkRegister">Crear usuario</a></p>
    </div>

    <div id="register-form" class="hidden">
      <div class="form-group"><label>Nombre</label><input type="text" id="regNombre" placeholder="Nombre"></div>
      <div class="form-group"><label>Apellido</label><input type="text" id="regApellido" placeholder="Apellido"></div>
      <div class="form-group"><label>Código de empleado</label><input type="text" id="regCodigo" placeholder="Ej: 80764"></div>
      <div class="form-group"><label>Cargo / Puesto</label><input type="text" id="regCargo" placeholder="Ej: Asistente POP"></div>
      <div class="form-group"><label>Hora entrada habitual</label><select id="regEntrada"><option value="">Selecciona hora</option></select></div>
      <div class="form-group"><label>Hora salida habitual</label><select id="regSalida"><option value="">Selecciona hora</option></select></div>
      <div class="form-group"><label>Contraseña</label><input type="password" id="regPass" placeholder="Mínimo 4 caracteres"></div>
      <button id="btnCreate">Crear cuenta</button>
      <button id="btnBack">Volver</button>
      <div id="register-message" class="message"></div>
    </div>
  </div>
</div>

<!-- Panel de Administración -->
<div id="admin-panel" class="hidden admin-panel">
  <h2>Panel de Administración</h2>
  <p style="text-align:center;color:#4b5563;margin-bottom:1.4rem;">Logueado como <strong>ADMIN</strong></p>
  
  <div class="admin-tabs">
    <div class="admin-tab active" data-tab="list">Lista de usuarios</div>
    <div class="admin-tab" data-tab="edit">Editar usuario</div>
  </div>

  <div id="admin-list" class="admin-content">
    <div id="userList"></div>
    <button id="btnDeleteAllUsers" class="btn-delete" style="margin-top:1.5rem;background:#991b1b;">Eliminar TODOS los usuarios (excepto ADMIN)</button>
  </div>

  <div id="admin-edit" class="admin-content hidden">
    <h3>Editar usuario</h3>
    <select id="editSelectUser"><option value="">Selecciona usuario</option></select>
    <div id="editForm" class="hidden">
      <div class="form-group"><label>Nombre</label><input id="editNombre"></div>
      <div class="form-group"><label>Apellido</label><input id="editApellido"></div>
      <div class="form-group"><label>Cargo</label><input id="editCargo"></div>
      <div class="form-group"><label>Hora entrada habitual</label><select id="editEntrada"><option value="">Selecciona hora</option></select></div>
      <div class="form-group"><label>Hora salida habitual</label><select id="editSalida"><option value="">Selecciona hora</option></select></div>
      <button id="btnSaveEdit">Guardar cambios</button>
      <button id="btnCancelEdit">Cancelar</button>
    </div>
  </div>

  <button id="btnBackToLogin" style="margin-top:2rem;">Volver al login</button>
</div>

<!-- Pantalla principal - Ponchador + Perfil -->
<div id="main-app" class="hidden">
  <div class="card">
    <header style="background:#1e40af;color:white;padding:1.4rem;text-align:center;border-radius:12px;margin-bottom:1.5rem;">
      <h2>Ponchador Diario</h2>
      <div id="userInfo"></div>
    </header>

    <div style="display:flex;gap:1rem;margin-bottom:1.5rem;justify-content:center;">
      <button id="btnShowPonchador" class="active" style="background:var(--primary);color:white;">Ponchar</button>
      <button id="btnShowProfile">Mi Perfil</button>
    </div>

    <div id="ponchador-view">
      <div style="background:#ecfdf5;padding:1rem;border-radius:10px;margin-bottom:1.5rem;text-align:center;">
        <strong>Jornada normal:</strong> 7 h efectivas<br>
        <strong>Break:</strong> 1 h (se resta si total ≥ 5 h)
      </div>
      <div id="status" style="background:#fefce8;padding:1.2rem;border-radius:10px;text-align:center;min-height:80px;font-size:1.2rem;">Cargando...</div>
      <div class="grid-2" style="margin:2rem 0;">
        <button id="btnEntrada" style="background:var(--primary);color:white;padding:1.5rem;font-size:1.5rem;"><i class="fas fa-sign-in-alt"></i> ENTRADA</button>
        <button id="btnSalida" style="background:var(--warning);color:white;padding:1.5rem;font-size:1.5rem;"><i class="fas fa-sign-out-alt"></i> SALIDA</button>
      </div>
      <button id="btnClearToday" style="background:var(--danger);color:white;width:100%;padding:1rem;margin-bottom:1rem;"><i class="fas fa-trash-alt"></i> Borrar hoy</button>
      <button id="btnExport" style="background:var(--accent);color:white;width:100%;padding:1.1rem;margin-bottom:1rem;"><i class="fas fa-file-excel"></i> Exportar Excel</button>
      <button id="btnLogout" style="background:#6b7280;color:white;width:100%;padding:1rem;">Cerrar sesión</button>
    </div>

    <div id="profile-view" class="hidden">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div id="profilePhotoContainer">
          <img id="profilePhoto" class="profile-pic" src="" alt="Foto de perfil" style="display:none;">
          <div id="profilePhotoPlaceholder" class="profile-pic profile-pic-placeholder"><i class="fas fa-user"></i></div>
        </div>
        <input type="file" id="inputPhoto" accept="image/*" style="display:none;">
        <button id="btnChangePhoto" class="edit-btn"><i class="fas fa-camera"></i> Cambiar foto</button>
      </div>
      <div class="form-group"><label>Nombre</label><input id="profileNombre" readonly></div>
      <div class="form-group"><label>Apellido</label><input id="profileApellido" readonly></div>
      <div class="form-group"><label>Código</label><input id="profileCodigo" readonly></div>
      <div class="form-group"><label>Cargo</label><input id="profileCargo" readonly></div>
      <div class="form-group"><label>Entrada habitual</label><input id="profileEntrada" readonly></div>
      <div class="form-group"><label>Salida habitual</label><input id="profileSalida" readonly></div>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────────────────
// IndexedDB - PonchadorApp
// ──────────────────────────────────────────────────────────────
let db, currentUser = null;
const DB_NAME = "PonchadorApp";
const USER_STORE = "usuarios";
const PONCHE_STORE = "ponches";
const hoy = new Date().toLocaleDateString("es-DO",{year:"numeric",month:"2-digit",day:"2-digit"});
const ADMIN_CODIGO = "ADMIN";
const ADMIN_PASS  = "ADMIN1";

function openDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME,2);
    req.onupgradeneeded = e=>{
      db = e.target.result;
      if(!db.objectStoreNames.contains(USER_STORE)) db.createObjectStore(USER_STORE,{keyPath:"codigo"});
      if(!db.objectStoreNames.contains(PONCHE_STORE)) db.createObjectStore(PONCHE_STORE,{keyPath:"fecha"});
    };
    req.onsuccess = e=>{db=e.target.result;res();};
    req.onerror = e=>rej(e.target.error);
  });
}

async function getUser(codigo){
  return new Promise(r=>{
    const tx = db.transaction(USER_STORE,"readonly");
    tx.objectStore(USER_STORE).get(codigo).onsuccess = e => r(e.target.result || null);
  });
}

async function getAllUsers(){
  return new Promise(r=>{
    db.transaction(USER_STORE,"readonly").objectStore(USER_STORE).getAll().onsuccess = e => r(e.target.result || []);
  });
}

async function saveUser(user){
  return new Promise(r=>{
    const tx = db.transaction(USER_STORE,"readwrite");
    tx.objectStore(USER_STORE).put(user);
    tx.oncomplete = () => r(true);
  });
}

async function deleteUser(codigo){
  if(codigo.toUpperCase()===ADMIN_CODIGO) return false;
  return new Promise(r=>{
    db.transaction(USER_STORE,"readwrite").objectStore(USER_STORE).delete(codigo);
    r(true);
  });
}

async function deleteAllNormalUsers(){
  const users = await getAllUsers();
  for(const u of users){
    if(u.codigo.toUpperCase() !== ADMIN_CODIGO) await deleteUser(u.codigo);
  }
  return true;
}

async function getPonches(){
  if(currentUser?.isAdmin) return [];
  return new Promise(r=>{
    db.transaction(PONCHE_STORE,"readonly").objectStore(PONCHE_STORE).getAll().onsuccess = e => r(e.target.result || []);
  });
}

async function savePonche(reg){
  if(currentUser?.isAdmin) return false;
  return new Promise(r=>{
    const tx = db.transaction(PONCHE_STORE,"readwrite");
    tx.objectStore(PONCHE_STORE).put(reg);
    tx.oncomplete = () => r(true);
  });
}

async function deleteTodayPonche(){
  if(currentUser?.isAdmin) return;
  await new Promise(r=>{
    db.transaction(PONCHE_STORE,"readwrite").objectStore(PONCHE_STORE).delete(hoy);
    r();
  });
}

function formatHour(d){return d.toLocaleTimeString("es-DO",{hour12:true,hour:"numeric",minute:"2-digit"});}

function calc(entrada,salida){
  let minE = entrada.getHours()*60 + entrada.getMinutes();
  let minS = salida.getHours()*60 + salida.getMinutes();
  if(minS < minE) minS += 1440;
  let totalH = (minS - minE)/60;
  let efectivas = totalH >= 5 ? totalH - 1 : totalH;
  let extras = Math.max(0, efectivas - 7);
  return {total:totalH.toFixed(2), efectivas:efectivas.toFixed(2), extras:extras.toFixed(2)};
}

// ─── Generar opciones de horas una sola vez ────────────────────────────────
function crearOpcionesHoras(selectId){
  const select = document.getElementById(selectId);
  if(!select) return;
  const horas = ["6:00am","7:00am","8:00am","9:00am","10:00am","11:00am","12:00pm","1:00pm","2:00pm","3:00pm","4:00pm","5:00pm","6:00pm","7:00pm","8:00pm","9:00pm","10:00pm","11:00pm","12:00am"];
  select.innerHTML = '<option value="">Selecciona hora</option>';
  horas.forEach(h=>{
    const opt = document.createElement("option");
    opt.value = h;
    opt.textContent = h;
    select.appendChild(opt);
  });
}

// Aplicar a todos los selects de horas
["regEntrada","regSalida","editEntrada","editSalida"].forEach(crearOpcionesHoras);

// ─── Helpers ───────────────────────────────────────
function showMessage(el,msg,cls="success"){el.innerHTML=`<div class="${cls}">${msg}</div>`;}
function hideAllScreens(){document.querySelectorAll("#auth-screen,#admin-panel,#main-app").forEach(s=>s.classList.add("hidden"));}
function showScreen(id){hideAllScreens();document.getElementById(id).classList.remove("hidden");}

// ─── Login ─────────────────────────────────────────
document.getElementById("btnLogin").onclick = async () => {
  const codigo = document.getElementById("inputCodigo").value.trim().toUpperCase();
  const pass = document.getElementById("inputPass").value;
  if(!codigo || !pass){showMessage(document.getElementById("login-message"),"Ingresa código y contraseña","error");return;}

  if(codigo === ADMIN_CODIGO && pass === ADMIN_PASS){
    currentUser = {codigo:ADMIN_CODIGO, nombre:"Administrador", isAdmin:true};
    showScreen("admin-panel");
    loadAdminInterface();
    return;
  }

  const user = await getUser(codigo);
  if(!user){showMessage(document.getElementById("login-message"),"Usuario no encontrado","error");return;}
  if(user.password !== pass){showMessage(document.getElementById("login-message"),"Contraseña incorrecta","error");return;}

  currentUser = user;
  showScreen("main-app");
  document.getElementById("userInfo").textContent = `Bienvenido, ${user.nombre} ${user.apellido}`;
  loadProfileData();
  loadPonches();
};

// ─── Registro ──────────────────────────────────────
document.getElementById("linkRegister").onclick = e => {e.preventDefault(); document.getElementById("login-form").classList.add("hidden"); document.getElementById("register-form").classList.remove("hidden");};
document.getElementById("btnBack").onclick = () => {document.getElementById("register-form").classList.add("hidden"); document.getElementById("login-form").classList.remove("hidden");};
document.getElementById("btnCreate").onclick = async () => {
  const nom = document.getElementById("regNombre").value.trim();
  const ape = document.getElementById("regApellido").value.trim();
  const cod = document.getElementById("regCodigo").value.trim();
  const car = document.getElementById("regCargo").value.trim();
  const ent = document.getElementById("regEntrada").value;
  const sal = document.getElementById("regSalida").value;
  const pas = document.getElementById("regPass").value;

  if(!nom || !ape || !cod || !car || !ent || !sal || !pas || pas.length < 4){
    showMessage(document.getElementById("register-message"),"Completa todos los campos correctamente","error");return;
  }
  if(cod.toUpperCase() === ADMIN_CODIGO){showMessage(document.getElementById("register-message"),"Código reservado","error");return;}
  if(await getUser(cod)){showMessage(document.getElementById("register-message"),"Código ya existe","error");return;}

  const newUser = {codigo:cod, nombre:nom, apellido:ape, cargo:car, horarioEntrada:ent, horarioSalida:sal, password:pas, foto:""};
  if(await saveUser(newUser)){
    showMessage(document.getElementById("register-message"),"Usuario creado. Inicia sesión.","success");
    setTimeout(()=>{document.getElementById("register-form").classList.add("hidden"); document.getElementById("login-form").classList.remove("hidden");}, 2200);
  }
};

// ─── ADMIN ─────────────────────────────────────────
async function loadAdminInterface(){
  document.querySelectorAll(".admin-tab").forEach(t=>t.classList.remove("active"));
  document.querySelector('[data-tab="list"]').classList.add("active");
  document.getElementById("admin-list").classList.remove("hidden");
  document.getElementById("admin-edit").classList.add("hidden");
  await loadUserList();
}

async function loadUserList(){
  const users = await getAllUsers();
  const cont = document.getElementById("userList");
  cont.innerHTML = "<h3>Usuarios registrados</h3>";
  if(users.length <= 1){cont.innerHTML += "<p style='text-align:center;color:#6b7280;'>No hay usuarios registrados.</p>";return;}

  users.forEach(u=>{
    if(u.codigo.toUpperCase() === ADMIN_CODIGO) return;
    const div = document.createElement("div");
    div.className = "user-item";
    div.innerHTML = `
      <div>
        <strong>${u.nombre} ${u.apellido}</strong><br>
        Código: ${u.codigo}<br>
        Cargo: ${u.cargo||"-"}<br>
        Horario: ${u.horarioEntrada||"--"} → ${u.horarioSalida||"--"}
      </div>
      <button class="btn-delete" data-codigo="${u.codigo}">Eliminar</button>
    `;
    cont.appendChild(div);
  });

  document.querySelectorAll(".btn-delete").forEach(btn=>{
    btn.onclick = async () => {
      if(!confirm(`Eliminar ${btn.dataset.codigo}?`)) return;
      if(await deleteUser(btn.dataset.codigo)){
        loadUserList();
        loadEditUserSelect();
      }
    };
  });
}

document.getElementById("btnDeleteAllUsers").onclick = async () => {
  if(!confirm("¿Eliminar TODOS los usuarios normales?\nNo se puede deshacer")) return;
  await deleteAllNormalUsers();
  loadUserList();
  loadEditUserSelect();
  alert("Usuarios eliminados.");
};

document.querySelectorAll(".admin-tab").forEach(tab=>{
  tab.onclick = () => {
    document.querySelectorAll(".admin-tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("admin-list").classList.toggle("hidden", tab.dataset.tab !== "list");
    document.getElementById("admin-edit").classList.toggle("hidden", tab.dataset.tab !== "edit");
    if(tab.dataset.tab === "edit") loadEditUserSelect();
  };
});

async function loadEditUserSelect(){
  const sel = document.getElementById("editSelectUser");
  sel.innerHTML = '<option value="">Selecciona usuario</option>';
  (await getAllUsers()).forEach(u=>{
    if(u.codigo.toUpperCase() === ADMIN_CODIGO) return;
    const opt = document.createElement("option");
    opt.value = u.codigo;
    opt.textContent = `${u.nombre} ${u.apellido} - ${u.codigo}`;
    sel.appendChild(opt);
  });
}

document.getElementById("editSelectUser").onchange = async e => {
  const codigo = e.target.value;
  const form = document.getElementById("editForm");
  if(!codigo){form.classList.add("hidden");return;}
  const user = await getUser(codigo);
  if(!user) return;
  document.getElementById("editNombre").value = user.nombre;
  document.getElementById("editApellido").value = user.apellido;
  document.getElementById("editCargo").value = user.cargo || "";
  document.getElementById("editEntrada").value = user.horarioEntrada || "";
  document.getElementById("editSalida").value = user.horarioSalida || "";
  form.classList.remove("hidden");
};

document.getElementById("btnSaveEdit").onclick = async () => {
  const codigo = document.getElementById("editSelectUser").value;
  if(!codigo) return;
  const user = await getUser(codigo);
  if(!user) return;
  user.nombre = document.getElementById("editNombre").value.trim();
  user.apellido = document.getElementById("editApellido").value.trim();
  user.cargo = document.getElementById("editCargo").value.trim();
  user.horarioEntrada = document.getElementById("editEntrada").value;
  user.horarioSalida = document.getElementById("editSalida").value;
  if(await saveUser(user)){
    alert("Usuario actualizado");
    loadUserList();
  }
};

document.getElementById("btnCancelEdit").onclick = () => document.getElementById("editForm").classList.add("hidden");

// ─── Perfil + Foto ─────────────────────────────────
function loadProfileData(){
  if(!currentUser) return;
  const u = currentUser;
  ["profileNombre","profileApellido","profileCodigo","profileCargo","profileEntrada","profileSalida"].forEach((id,i)=>{
    document.getElementById(id).value = [u.nombre, u.apellido, u.codigo, u.cargo||"No especificado", u.horarioEntrada||"No configurado", u.horarioSalida||"No configurado"][i];
  });

  const img = document.getElementById("profilePhoto");
  const ph = document.getElementById("profilePhotoPlaceholder");
  if(u.foto){
    img.src = u.foto;
    img.style.display = "block";
    ph.style.display = "none";
  } else {
    img.style.display = "none";
    ph.style.display = "block";
  }
}

document.getElementById("btnChangePhoto").onclick = () => document.getElementById("inputPhoto").click();

document.getElementById("inputPhoto").onchange = async e => {
  const file = e.target.files[0];
  if(!file || !file.type.startsWith("image/")){alert("Solo imágenes");return;}
  const reader = new FileReader();
  reader.onload = async ev => {
    currentUser.foto = ev.target.result;
    await saveUser(currentUser);
    loadProfileData();
    alert("Foto actualizada");
  };
  reader.readAsDataURL(file);
};

// ─── Ponchador ─────────────────────────────────────
async function loadPonches(){
  const regs = await getPonches();
  const reg = regs.find(r=>r.fecha===hoy);
  let html = reg?.entrada ? `Entrada: <b>${reg.entrada.hora}</b>` : "Aún no has ponchado hoy";
  if(reg?.salida){
    const d = calc(new Date(reg.entrada.full), new Date(reg.salida.full));
    html += `<br>Salida: <b>${reg.salida.hora}</b><br>Efectivas: <b>${d.efectivas} h</b>`;
    if(d.extras>0) html += ` +${d.extras} extras`;
  } else if(reg?.entrada){
    html += "<br>Esperando salida...";
  }
  document.getElementById("status").innerHTML = html;
}

document.getElementById("btnEntrada").onclick = async () => {
  const regs = await getPonches();
  let reg = regs.find(r=>r.fecha===hoy) || {fecha:hoy,entrada:null,salida:null};
  if(reg.entrada){document.getElementById("status").innerHTML="Ya registraste entrada hoy";return;}
  const ahora = new Date();
  reg.entrada = {hora:formatHour(ahora), full:ahora.toISOString()};
  await savePonche(reg);
  loadPonches();
};

document.getElementById("btnSalida").onclick = async () => {
  const regs = await getPonches();
  const reg = regs.find(r=>r.fecha===hoy);
  if(!reg?.entrada){document.getElementById("status").innerHTML="Primero registra entrada";return;}
  if(reg.salida){document.getElementById("status").innerHTML="Ya registraste salida";return;}
  const ahora = new Date();
  reg.salida = {hora:formatHour(ahora), full:ahora.toISOString()};
  await savePonche(reg);
  loadPonches();
};

document.getElementById("btnClearToday").onclick = async () => {
  if(!confirm("¿Borrar registro de hoy?")) return;
  await deleteTodayPonche();
  loadPonches();
};

document.getElementById("btnExport").onclick = async () => {
  const regs = await getPonches();
  const data = regs.filter(r=>r.entrada&&r.salida).map(r=>{
    const d = calc(new Date(r.entrada.full), new Date(r.salida.full));
    return {Fecha:r.fecha, Entrada:r.entrada.hora, Salida:r.salida.hora, "Total h":d.total, "Efectivas h":d.efectivas, "Extras h":d.extras};
  });
  if(!data.length){alert("No hay registros completos");return;}
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Ponches");
  XLSX.writeFile(wb,`Ponches_${currentUser.codigo}_${new Date().toISOString().slice(0,10)}.xlsx`);
};

document.getElementById("btnShowPonchador").onclick = function(){
  this.classList.add("active");
  document.getElementById("btnShowProfile").classList.remove("active");
  document.getElementById("ponchador-view").classList.remove("hidden");
  document.getElementById("profile-view").classList.add("hidden");
};

document.getElementById("btnShowProfile").onclick = function(){
  this.classList.add("active");
  document.getElementById("btnShowPonchador").classList.remove("active");
  document.getElementById("ponchador-view").classList.add("hidden");
  document.getElementById("profile-view").classList.remove("hidden");
  loadProfileData();
};

  currentUser = null;
  showScreen("auth-screen");

  document.getElementById("inputPass").value = "";
};

};
